<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Thunderstudy — Offline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e8ecf4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }
    .card {
      background: #1a2030;
      border: 1.5px solid #2a3348;
      border-radius: 28px;
      padding: 40px 32px;
      max-width: 380px;
      width: 100%;
    }
    .icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #4f6ef7, #7c3aed);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      box-shadow: 0 12px 32px rgba(79,110,247,.35);
    }
    h1 {
      font-size: 22px;
      font-weight: 900;
      margin-bottom: 10px;
      letter-spacing: -.3px;
    }
    p {
      font-size: 13px;
      color: #9298b5;
      line-height: 1.7;
      margin-bottom: 28px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(79,110,247,.1);
      border: 1.5px solid rgba(79,110,247,.25);
      border-radius: 30px;
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 700;
      color: #818cf8;
      margin-bottom: 24px;
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #f43f5e;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: .5; transform: scale(1.3); }
    }
    button {
      width: 100%;
      padding: 13px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #4f6ef7, #7c3aed);
      color: #fff;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 6px 20px rgba(79,110,247,.3);
      margin-bottom: 10px;
    }
    .sub-btn {
      background: transparent;
      border: 1.5px solid #2a3348;
      color: #9298b5;
      box-shadow: none;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- Logo -->
    <div class="icon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none"
        stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
    </div>

    <!-- Status -->
    <div class="badge">
      <div class="dot"></div>
      No Internet Connection
    </div>

    <h1>You're Offline</h1>
    <p>
      Thunderstudy needs a connection to load for the first time.
      Once loaded, it works fully offline — all your scores and
      data are saved on your device.
    </p>

    <!-- Retry -->
    <button onclick="window.location.reload()">
      ↻ &nbsp; Try Again
    </button>
    <button class="sub-btn" onclick="window.location.reload()">
      Check Connection & Reload
    </button>
  </div>

  <script>
    // Auto-retry when connection comes back
    window.addEventListener('online', function() {
      window.location.reload();
    });
  </script>
</body>
</html>
